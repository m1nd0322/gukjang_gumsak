name: 일일 국장검색 리포트

on:
  schedule:
    # 평일(월~금) 한국시간 오전 8시 (UTC 23:00 전일, 일~목)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
    # 수동 실행 지원

concurrency:
  group: daily-report-nps-state
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 국민연금 신호 상태 복원
        uses: actions/cache/restore@v4
        with:
          path: nps_state.json
          key: nps-state-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            nps-state-${{ runner.os }}-

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 회귀 테스트
        run: python -m unittest discover -s tests -v

      - name: 일일 리포트 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_report.py

      - name: 국민연금 신호 상태 저장
        if: success()
        uses: actions/cache/save@v4
        with:
          path: nps_state.json
          key: nps-state-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: CSV 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-csv-${{ github.run_number }}
          path: backtest_*.csv
          retention-days: 30
          if-no-files-found: ignore
